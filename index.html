<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIKAL-Ai - AI Video Generator</title>
  <style>
    /* (Style lu tetep sama, biar gak berubah tampilannya) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
    body { background: #060913; color: #e2e8f0; min-height: 100vh; padding-bottom: 40px; }
    .header { background: #0b132b; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1c2541; }
    .logo-text { font-size: 24px; font-weight: 800; color: #00b4d8; display: flex; align-items: center; gap: 8px; }
    .container { max-width: 640px; margin: 30px auto; padding: 0 16px; }
    .card { background: #0b132b; border: 1px solid #1c2541; border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .btn-generate { width: 100%; padding: 14px; background: #00b4d8; border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .btn-generate:disabled { background: #1c2541; color: #64748b; }
    video { width: 100%; border-radius: 12px; margin-top: 16px; border: 1px solid #1c2541; }
    .loader { text-align: center; color: #00b4d8; padding: 16px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-text">⚡ SIKAL-Ai</div>
  </div>
  <div class="container">
    <div class="screen active" id="innerScreen">
      <button class="btn-generate" id="generateBtn" onclick="startGenerate()">🚀 Generate Video</button>
      <div id="resultZone"></div>
    </div>
  </div>

  <script>
    let currentModel = 'kling_3_0', currentProvider = 'freepik', base64ImageData = null;

    async function startGenerate() {
      const apiKey = localStorage.getItem('sikal_key');
      const prompt = document.getElementById('promptInput')?.value.trim();
      const btn = document.getElementById('generateBtn');
      const resultZone = document.getElementById('resultZone');
      
      if (!prompt) return alert('Prompt kosong!');
      
      btn.disabled = true;
      resultZone.innerHTML = `<div class="loader">🌀 Sedang memproses...</div>`;
      
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, apiKey, provider: currentProvider, modelType: currentModel, imageUrl: base64ImageData })
        });
        
        // --- DEBUGGING LOGIC ---
        const responseText = await res.text(); // Ambil teks mentah
        console.log("Respon Mentah Server:", responseText); // Lihat di Console Browser
        
        const data = JSON.parse(responseText);
        
        if (data.error) throw new Error(data.error);
        
        const rid = data.id || data.request_id;
        if (!rid) throw new Error("Server sukses tapi tidak mengirimkan ID (Request ID)");
        
        pollStatus(rid, apiKey, currentProvider);
      } catch (err) { 
        resultZone.innerHTML = `<p style="color:red;">❌ Error: ${err.message}</p>`; 
        btn.disabled = false; 
      }
    }

    async function pollStatus(rid, key, provider) {
      const resultZone = document.getElementById('resultZone');
      const interval = setInterval(async () => {
        try {
          const res = await fetch('/api/status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ request_id: rid, apiKey: key, provider: provider })
          });
          const data = await res.json();
          console.log("Polling Status:", data);

          if (data.status === 'COMPLETED' || data.video?.url || data.data?.url) {
            clearInterval(interval);
            const vUrl = data.video?.url || data.data?.url || data.video_url || data.output;
            resultZone.innerHTML = `<video src="${vUrl}" controls autoplay loop muted></video>`;
            document.getElementById('generateBtn').disabled = false;
          }
        } catch (e) { console.error(e); }
      }, 5000);
    }
  </script>
</body>
</html>
