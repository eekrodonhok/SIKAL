<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIKAL-Ai | Official Studio</title>
    <style>
        :root { --bg: #060913; --panel: #0b132b; --blue: #00b4d8; --text: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        
        .header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        .logo { font-size: 32px; font-weight: 800; color: var(--blue); letter-spacing: 1px; text-transform: uppercase; }
        .subtitle { font-size: 12px; color: #64748b; margin-top: 5px; }

        .panel { background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: #94a3b8; }
        
        input[type="text"], textarea { width: 100%; background: #070a13; color: white; padding: 16px; border-radius: 12px; border: 1px solid #1e293b; margin-bottom: 15px; outline: none; font-size: 14px; transition: 0.3s; }
        input[type="text"]:focus, textarea:focus { border-color: var(--blue); }
        textarea { height: 120px; resize: none; }

        .btn { background: linear-gradient(90deg, #00b4d8, #0077b6); color: white; padding: 16px; border: none; border-radius: 12px; width: 100%; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-gen { background: var(--blue); color: #060913; font-size: 16px; letter-spacing: 0.5px; }

        .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .m-btn { background: #141f36; padding: 12px; border-radius: 10px; border: 1px solid #1e293b; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; color: #94a3b8; }
        .m-btn.active { border-color: var(--blue); color: var(--blue); background: #0f172a; box-shadow: 0 0 10px rgba(0, 180, 216, 0.2); }
        
        .hidden { display: none; }
        .logout-link { text-align: center; font-size: 12px; color: #64748b; cursor: pointer; text-decoration: underline; margin-top: 15px; }
        
        #result-zone { text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">SIKAL-Ai</div>
        <div class="subtitle">Real Smartphone AI Video Studio</div>
    </div>

    <div id="auth-panel" class="panel">
        <div class="panel-title">🔑 Masukkan API Key Lu</div>
        <input type="text" id="token-input" placeholder="Masukkan token hf_xxxxxxxxx">
        <button class="btn" onclick="saveToken()">Simpan & Masuk Studio</button>
    </div>

    <div id="studio-panel" class="panel hidden">
        <div class="panel-title">🎬 Studio Video Khas HP</div>
        
        <div class="model-grid">
            <div class="m-btn active" onclick="selectModel(this, 'tencent/HunyuanVideo')">HunyuanVideo (Gacor)</div>
            <div class="m-btn" onclick="selectModel(this, 'THUDM/CogVideoX-5b')">CogVideoX</div>
            <div class="m-btn" onclick="selectModel(this, 'guoyww/AnimateDiff')">AnimateDiff</div>
            <div class="m-btn" onclick="selectModel(this, 'StabilityAI/stable-video-diffusion-img2vid-xt')">StableVideo</div>
        </div>

        <textarea id="prompt" placeholder="Ketik kejadiannya bray (Contoh: Cowo sama cewe lagi jalan depan indomaret)..."></textarea>
        <button id="gen-btn" class="btn btn-gen" onclick="generateVideo()">🚀 Generate Video HP Asli</button>
        
        <div id="result-zone"></div>
        
        <div class="logout-link" onclick="logout()">Keluar / Ganti Token</div>
    </div>
</div>

<script>
    let selectedModel = 'tencent/HunyuanVideo';

    window.onload = function() {
        if(localStorage.getItem('sikal_hf_token')) {
            document.getElementById('auth-panel').classList.add('hidden');
            document.getElementById('studio-panel').classList.remove('hidden');
        }
    }

    function saveToken() {
        const t = document.getElementById('token-input').value.trim();
        if(t.startsWith('hf_')) {
            localStorage.setItem('sikal_hf_token', t);
            location.reload();
        } else {
            alert('Token salah bray, harus diawali hf_!');
        }
    }

    function selectModel(element, modelName) {
        document.querySelectorAll('.m-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        selectedModel = modelName;
    }

    function logout() {
        localStorage.removeItem('sikal_hf_token');
        location.reload();
    }

    // DISINI RACIKAN BIAR HASILNYA KHAS HP ASLI (MURNI REALIS & SILENT)
    async function generateVideo() {
        const userPrompt = document.getElementById('prompt').value.trim();
        const token = localStorage.getItem('sikal_hf_token');
        const btn = document.getElementById('gen-btn');
        const resultZone = document.getElementById('result-zone');
        
        if(!userPrompt) return alert('Ketik prompt-nya dulu, cok!');
        
        // Suntikan Magic Word buat maksa AI ngikutin gaya HP asli: f/18 deep depth of field, shaky handheld, no cinematic lighting, muted color, strictly silent video
        const rawSmartphonePrompt = `${userPrompt}, captured on amateur smartphone camera, iPhone 15 pro max style, deep depth of field, f/18 aperture clarity, sharp focus background and foreground, amateur handheld video footage, shaky phone movement, natural daylight, ordinary everyday life aesthetic, non-cinematic, realistic raw footage, muted coloring, completely silent video, no talking, no background music`;

        btn.disabled = true;
        btn.innerText = 'Lagi dimasak ala kamera HP...';
        resultZone.innerHTML = '<p style="color:#00b4d8; font-size:13px; margin-top:15px;">Sedang memproses video mentah (tanpa cinematic/suara)...</p>';

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: rawSmartphonePrompt, // Prompt racikan HP yang dikirim ke backend
                    token: token, 
                    model: selectedModel 
                })
            });

            if (!res.ok) throw new Error('API Hugging Face sibuk bray, coba beberapa saat lagi!');

            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            resultZone.innerHTML = `<video src="${url}" controls autoplay loop style="width:100%; border-radius:12px; margin-top:15px; border:1px solid #1e293b;"></video>`;
        } catch (err) {
            resultZone.innerHTML = `<p style="color:red; font-size:13px; margin-top:15px;">Error: ${err.message}</p>`;
        } finally {
            btn.disabled = false;
            btn.innerText = '🚀 Generate Video HP Asli';
        }
    }
</script>
</body>
</html>
